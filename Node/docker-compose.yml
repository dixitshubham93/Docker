services:
   node_app:
      build:
         context: .
      container_name: "node_cont"
      depends_on:
       mysql:
        condition: service_healthy
      ports:
         - "3000:3000"
      restart: always
      networks:
         - my-network
      healthcheck:
          test: ["CMD-SHELL", "curl -f http://localhost:3000 || exit 1"]
          interval: 10s
          timeout: 5s
          retries: 5
          start_period: 30s 
   
   mysql:
      image: mysql
      container_name: "mysql_cont"
      environment:
         - MYSQL_ROOT_PASSWORD=root
         - MYSQL_DATABASE=test_db
      volumes:
         - mysql_data:/var/lib/mysql
      networks:
         - my-network
      restart: always

      healthcheck:
          test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
          interval: 10s
          timeout: 5s
          retries: 5
          start_period: 60s
  
networks:
   my-network:
volumes:
   mysql_data:

