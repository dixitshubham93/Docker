<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHAT</title>
</head>
<body>
     <h1>ADD USER</h1>
    <form id="userForm">
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <br></br>
        <p>You are Allowed to Work? </p>
        <label><input type="radio" name="isAllowed" value="Yes"> Yes</label>
        <label><input type="radio" name="isAllowed" value="No"> No</label>

        <p>What Are The Skill Do you have?</p>
        <label><input type="checkbox" name="skills" value="JavaScript"> JavaScript</label>
        <label><input type="checkbox" name="skills" value="Python"> Python</label>
        <label><input type="checkbox" name="skills" value="Java"> Java</label>
        <label><input type="checkbox" name="skills" value="C++"> C++</label>
        
        <button type="submit">Add User</button>
    </form>
    <script src="index.js"></script>
</body>
</html>
